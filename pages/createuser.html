<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Create User</title>

    <link rel="stylesheet" href="/style/product&user.css" />
  </head>

  <body>
    <header>
      <button><a href="/pages/admindashboard.html" style="text-decoration: none; ">Dashboard</a></button>
    </header>

    <main>
      <section class="form-card">
        <header class="form-header">
          <div>
            <h2>Create New User</h2>

            <p>Fill in the details below to create a new user account.</p>
          </div>

          <button><a href="/pages/adduser.html" style="text-decoration: none; color: black;">← Back to Users</a></button>
        </header>

        <section class="form-section">
          <h3>👤 Personal Information</h3>

          <div class="grid">
            <input placeholder="Full Name" /> <br><br>

            <input placeholder="Username" /><br><br>

            <input placeholder="Email Address" /><br><br>

            <input placeholder="Phone Number" /><br><br>

            <input placeholder="Date of Birth" /><br><br>

            <select>
              <option>Select Gender</option>
            </select>
          </div>
        </section>

        <section class="form-section">
          <h3>🔒 Account Information</h3>

          <div class="grid">
            <input placeholder="Password" /><br><br>

            <input placeholder="Confirm Password" /><br><br>

            <select>
              <option>Select Role</option>
              <option>Active</option>
            </select>
          </div>
        </section>

        <section class="form-section">
          <h3>🏢 Additional Information</h3>

          <div class="grid">
            <select>
              <option>Select Department</option>
            </select><br>

            <input placeholder="Designation" />
          </div>

          <textarea placeholder="Address"></textarea>
        </section>

        <section class="form-section">
          <h3>🖼 Profile Picture</h3>

          <input type="file" />

          <div class="image-box">Profile Preview</div>
        </section>

        <footer class="buttons">
          <button class="reset">Reset</button>

          <button class="primary">+ Create User</button>
        </footer>
      </section>
    </main>
  </body>
</html>
