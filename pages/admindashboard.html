<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin dashboard</title>
  </head>
  <body>
    <!doctype html>
    <html>
      <head>
        <style>
          body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f7efe5;
          }

          .sidebar {
            width: 250px;
            height: 100vh;
            background: white;
            padding: 25px;
            box-sizing: border-box;
          }

          .logo {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 30px;
            color: #ff8a00;
          }

          .menu {
            list-style: none;
            padding: 0;
          }

          .menu a {
            text-decoration: none;
            color: #777;
          }
          .menu li {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 14px;
            color: #777;
            font-size: 18px;
            border-radius: 10px;
            margin-bottom: 8px;
          }

          .menu li.active {
            background: #ff8a00;
            color: white;
          }

          .menu li:hover {
            background: #eee;
          }
        </style>
      </head>

      <body>
        <div class="sidebar">
          <div class="logo">NIKE</div>

          <ul class="menu">
            <li class="active">▦ Dashboard</li>

            <li><a href="/pages/createuser.html">Create user</a></li>
            <li><a href="/pages/adduser.html">Users</a></li>

            <li><a href="/pages/product.html">Add Product</a></li>

            <li><a href="/pages/products.html">Products</a></li>
          </ul>
        </div>
      </body>
    </html>
  </body>
</html>
