<!DOCTYPE html>
<html lang="en">

<head>
    <title>Login</title>
    <link rel="stylesheet" href="/style/siginup.css">
</head>

<body>

<header>
    <h1>Login</h1>
</header>


<main>

<section class="page">

<div class="box login">

    <div class="profile">
        👤
    </div>

    <h2>Login</h2>

    <p>Welcome back! Please login to your account.</p>


    <form>

        <label>Email Address</label>
        <input type="email" placeholder="Enter your email">


        <label>Password</label>
        <input type="password" placeholder="Enter your password">


        <div class="remember">

            <div>
                <input type="checkbox">
                Remember me
            </div>

            <a href="#">Forgot Password?</a>

        </div>


        <button>Login</button>


        <div class="or">
            <span></span>
            or
            <span></span>
        </div>


        <button class="google">
            🌈 Login with Google
        </button>


        <p>
            Don't have an account?
            <a href="/pages/siginupandlogin.html">Sign up</a>
        </p>


    </form>


</div>


</section>


</main>


<footer>
    © 2026
</footer>


</body>
</html>
