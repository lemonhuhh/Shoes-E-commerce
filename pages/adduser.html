<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users Dashboard</title>
    <link rel="stylesheet" href="/style/adduser.css">
</head>
<body>

<div class="container">

    <header class="top-header">
        <div>
            <h1>Users</h1>
            <p>List of users using our system</p>
        </div>

        <button class="add-btn">+ Add New User</button>
    </header>

    <section class="filters">
        <input type="text" placeholder="Search users...">

        <select>
            <option>All Roles</option>
            <option>Admin</option>
            <option>Teacher</option>
            <option>Student</option>
        </select>

        <select>
            <option>All Status</option>
            <option>Active</option>
            <option>Inactive</option>
        </select>

        <button class="reset-btn">Reset Filters</button>
    </section>

    <section class="users-table">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>User</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Status</th>
                    <th>Joined On</th>
                    <th>Last Login</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td>1</td>
                    <td>John Doe</td>
                    <td>john@example.com</td>
                    <td><span class="admin">Admin</span></td>
                    <td><span class="active">Active</span></td>
                    <td>01 May 2024</td>
                    <td>20 May 2024</td>
                    <td>
                        <button>Edit</button>
                        <button>Delete</button>
                    </td>
                </tr>

                <tr>
                    <td>2</td>
                    <td>Sarah Johnson</td>
                    <td>sarah@example.com</td>
                    <td><span class="teacher">Teacher</span></td>
                    <td><span class="active">Active</span></td>
                    <td>03 May 2024</td>
                    <td>20 May 2024</td>
                    <td>
                        <button>Edit</button>
                        <button>Delete</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </section>

    <footer class="footer">
        <p>Showing 1 to 8 of 24 users</p>

        <div class="pagination">
            <button>&lt;</button>
            <button class="current">1</button>
            <button>2</button>
            <button>3</button>
            <button>&gt;</button>
        </div>
    </footer>

</div>

</body>
</html>
